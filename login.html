<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login healify</title>
    <style>

#bg-vid {
  position: fixed;
  top: 0;
  left: 0;
  min-width: 100%;
  min-height: 100%;
  object-fit: cover;
  z-index: -1;
}


body {
  margin: 0;
  padding: 0;
  font-family: "Segoe UI", sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}


.logo-center {
  margin-top: 0px;
  text-align: center;
}

.logo-center img {
  max-width: 60px;
  height: auto;
}


.landing-btn {
  margin-top: 20px;
  text-decoration: none;
  color: #ffffff;
  background-color: rgba(255, 255, 255, 0.2);
  padding: 10px 20px;
  border-radius: 8px;
  font-weight: 500;
  backdrop-filter: blur(4px);
  transition: background 0.3s;
}

.landing-btn:hover {
  background-color: rgba(255, 255, 255, 0.4);
}

.form-center {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
  background-color: rgba(255, 255, 255, 0.85);
  padding: 40px;
  border-radius: 12px;
  border: 2px solid #ffffff;
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  max-width: 400px;
  width: 100%;
  margin-top: 30px;
  margin-bottom: 30px;
  text-align: left;
  box-sizing: border-box;
}

.sign-in {
  text-align: center;
  color: #161616;
  margin-bottom: 10px;
}

.tagline {
  text-align: center;
  font-size: 14px;
  color: #444;
  margin-bottom: 30px;
}

.bold {
  font-weight: bold;
  color: #5409DA;
}

input[type="email"],
input[type="password"] {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-size: 14px;
  box-sizing: border-box;
}

input:focus,
textarea:focus {
  border: 3px solid #5409DA;
  outline: none; 
}


button[type="submit"] {
  width: 100%;
  padding: 12px;
  background-color: #5409DA;
  color: #fff;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 20px;
}

.forgot-pw {
  display: block;
  text-align: right;
  font-size: 13px;
  color: #5409DA;
  text-decoration: none;
  margin-top: 10px;
}

.sign-up {
  margin-top: 20px;
  font-size: 13px;
  color: #444;
  text-align: center;
}

.sign-up + a {
  display: block;
  text-align: center;
  color: #5409DA;
  font-weight: 500;
  margin-top: 4px;
}

@media (max-width: 768px) {
  /* Tablet */
  body {
    height: auto;
    padding: 24px;
    justify-content: flex-start;
  }

  #bg-vid {
    opacity: 0.6;
    filter: blur(1px);
  }

  .form-center {
    margin: 20px auto;
    padding: 28px;
    max-width: 440px;
    width: 100%;
    border-radius: 10px;
  }

  .logo-center img {
    max-width: 72px;
  }

  .sign-in { font-size: 20px; }
  .tagline { font-size: 15px; }

  input[type="email"],
  input[type="password"] {
    font-size: 15px;
    padding: 11px;
  }

  button[type="submit"] {
    padding: 12px;
    font-size: 15px;
  }

  .landing-btn {
    margin-top: 12px;
    display: inline-block;
  }
}

@media (max-width: 400px) {
  /* Phone */
  #bg-vid {
    display: none; /* improve performance on small devices */
  }

  body {
    padding: 12px;
    height: auto;
    justify-content: flex-start;
  }

  .form-center {
    margin: 12px auto;
    padding: 18px;
    border-radius: 8px;
    max-width: 360px;
    width: calc(100% - 24px);
  }

  .logo-center img {
    max-width: 56px;
  }

  .sign-in { font-size: 18px; }
  .tagline { font-size: 13px; }

  input[type="email"],
  input[type="password"] {
    padding: 10px;
    font-size: 14px;
  }

  button[type="submit"] {
    padding: 10px;
    font-size: 15px;
  }

  .landing-btn {
    padding: 8px 12px;
    font-size: 14px;
  }

  .form-center {
    box-shadow: 0 6px 18px rgba(0,0,0,0.12);
    border: 1px solid rgba(0,0,0,0.04);
  }
}
    </style>
</head>
<body>
    <video autoplay muted loop id="bg-vid"><source src="vid/healify.login.mp4" type="video/mp4">Browswr kamu tidak mendukung video</video>

    <a href="landing.html" class="landing-btn"> ← Kembali ke halaman utama</a>
    <div class="form-center">
    <div class="logo-center">
        <img src="img/healify_logo.png" alt="healify-logo">
    </div>
        <form action="main.html" method="get">
            <h2 class="sign-in">Selamat Datang!</h2>
            <p class="tagline"><span class="bold">Hi healifers,</span> masukkan akun anda</p>
            <label for="name">Email</label>
            <br>
            <input 
            type="email"
            name="email"
            id="email"
            placeholder="Masukkan email anda"
            required>
            <br><br>
            <label for="password">Password</label>
            <br>
            <input 
            type="password" 
            name="password" 
            id="password"
            placeholder="Masukkan kata sandi anda"
            required>
            <br><br>
            <a href="#" class="forgot-pw">Lupa password?</a>
            <br>
            <button type="submit">Login</button>

            <p class="sign-up">Belum punya akun?</p> <a href="register.html">Daftar sekarang</a>
        </form>
    </div>
</body>
</html>
